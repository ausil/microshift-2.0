name: RPM Build Check

on:
  pull_request:
    paths:
      - 'packaging/rpm/**'
      - 'packaging/systemd/**'
      - 'packaging/config/**'
      - 'Makefile'
      - '.packit.yaml'

permissions:
  contents: read

jobs:
  spec-check:
    name: Validate RPM spec
    runs-on: ubuntu-latest
    container:
      image: registry.fedoraproject.org/fedora:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install rpmbuild tools
        run: dnf install -y rpm-build rpmdevtools

      - name: Validate spec file
        run: rpmbuild --nobuild --nodeps packaging/rpm/microshift.spec

      - name: Check spec version matches
        run: |
          spec_version=$(grep '^Version:' packaging/rpm/microshift.spec | awk '{print $2}')
          echo "Spec version: $spec_version"
          if [ -z "$spec_version" ]; then
            echo "Could not parse version from spec file"
            exit 1
          fi

  systemd-check:
    name: Validate systemd units
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install systemd
        run: sudo apt-get update && sudo apt-get install -y systemd

      - name: Validate unit files
        run: |
          for unit in packaging/systemd/*.service; do
            echo "Checking $unit..."
            systemd-analyze verify --man=no "$unit" 2>&1 || true
          done

      - name: Check all services reference microshift.service
        run: |
          for unit in packaging/systemd/microshift-*.service; do
            if ! grep -q 'PartOf=microshift.service' "$unit"; then
              echo "$unit is missing PartOf=microshift.service"
              exit 1
            fi
          done
