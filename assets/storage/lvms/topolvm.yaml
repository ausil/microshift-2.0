apiVersion: v1
kind: Namespace
metadata:
  name: topolvm-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: topolvm-controller
  namespace: topolvm-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: topolvm-node
  namespace: topolvm-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: topolvm-controller
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "update", "delete"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims/status"]
    verbs: ["patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumes"]
    verbs: ["get", "list", "watch", "create", "delete", "update", "patch"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshots"]
    verbs: ["get", "list"]
  - apiGroups: ["snapshot.storage.k8s.io"]
    resources: ["volumesnapshotcontents"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["list", "watch", "create", "update", "patch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["volumeattachments/status"]
    verbs: ["patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: topolvm-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: topolvm-controller
subjects:
  - kind: ServiceAccount
    name: topolvm-controller
    namespace: topolvm-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: topolvm-node
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["csinodes"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: topolvm-node
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: topolvm-node
subjects:
  - kind: ServiceAccount
    name: topolvm-node
    namespace: topolvm-system
---
apiVersion: storage.k8s.io/v1
kind: CSIDriver
metadata:
  name: topolvm.io
spec:
  attachRequired: false
  podInfoOnMount: true
  volumeLifecycleModes:
    - Persistent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: topolvm-controller
  namespace: topolvm-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: topolvm-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: topolvm-controller
    spec:
      serviceAccountName: topolvm-controller
      tolerations:
        - key: CriticalAddonsOnly
          operator: Exists
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: topolvm-controller
          image: ghcr.io/topolvm/topolvm-with-sidecar:v15.5.0
          command:
            - /topolvm-controller
            - --cert-dir=/certs
          ports:
            - containerPort: 9808
              name: healthz
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: healthz
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            failureThreshold: 3
            periodSeconds: 10
          volumeMounts:
            - name: socket-dir
              mountPath: /run/topolvm
            - name: certs
              mountPath: /certs
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
        - name: csi-provisioner
          image: ghcr.io/topolvm/topolvm-with-sidecar:v15.5.0
          command:
            - /csi-provisioner
            - --csi-address=/run/topolvm/csi-topolvm.sock
            - --feature-gates=Topology=true
            - --enable-capacity
            - --capacity-ownerref-level=2
          volumeMounts:
            - name: socket-dir
              mountPath: /run/topolvm
        - name: csi-resizer
          image: ghcr.io/topolvm/topolvm-with-sidecar:v15.5.0
          command:
            - /csi-resizer
            - --csi-address=/run/topolvm/csi-topolvm.sock
          volumeMounts:
            - name: socket-dir
              mountPath: /run/topolvm
      volumes:
        - name: socket-dir
          emptyDir: {}
        - name: certs
          secret:
            secretName: topolvm-controller-cert
            optional: true
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: topolvm-node
  namespace: topolvm-system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: topolvm-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: topolvm-node
    spec:
      serviceAccountName: topolvm-node
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: topolvm-node
          image: ghcr.io/topolvm/topolvm-with-sidecar:v15.5.0
          command:
            - /topolvm-node
            - --lvmd-socket=/run/lvmd/lvmd.sock
          securityContext:
            privileged: true
          ports:
            - containerPort: 9808
              name: healthz
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: healthz
            failureThreshold: 3
            periodSeconds: 10
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          volumeMounts:
            - name: node-plugin-dir
              mountPath: /run/topolvm
            - name: lvmd-socket-dir
              mountPath: /run/lvmd
            - name: pod-volumes-dir
              mountPath: /var/lib/kubelet/pods
              mountPropagation: Bidirectional
            - name: csi-plugin-dir
              mountPath: /var/lib/kubelet/plugins/kubernetes.io/csi
              mountPropagation: Bidirectional
        - name: csi-registrar
          image: ghcr.io/topolvm/topolvm-with-sidecar:v15.5.0
          command:
            - /csi-node-driver-registrar
            - --csi-address=/run/topolvm/csi-topolvm.sock
            - --kubelet-registration-path=/var/lib/kubelet/plugins/topolvm.io/node/csi-topolvm.sock
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - rm -rf /registration/topolvm.io /registration/topolvm.io-reg.sock
          volumeMounts:
            - name: node-plugin-dir
              mountPath: /run/topolvm
            - name: registration-dir
              mountPath: /registration
        - name: lvmd
          image: ghcr.io/topolvm/topolvm-with-sidecar:v15.5.0
          command:
            - /lvmd
            - --container
          securityContext:
            privileged: true
          env:
            - name: LVM_SYSTEM_DIR
              value: /etc/lvm
            - name: LVMD_DEVICE_CLASSES
              value: '[{"name":"default","volume-group":"{{.VolumeGroup}}","default":true,"spare-gb":0}]'
          volumeMounts:
            - name: lvmd-socket-dir
              mountPath: /run/lvmd
            - name: dev-dir
              mountPath: /dev
            - name: udev-dir
              mountPath: /run/udev
            - name: lvm-dir
              mountPath: /etc/lvm
      volumes:
        - name: registration-dir
          hostPath:
            path: /var/lib/kubelet/plugins_registry/
            type: Directory
        - name: node-plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/topolvm.io/node
            type: DirectoryOrCreate
        - name: csi-plugin-dir
          hostPath:
            path: /var/lib/kubelet/plugins/kubernetes.io/csi
            type: DirectoryOrCreate
        - name: pod-volumes-dir
          hostPath:
            path: /var/lib/kubelet/pods
            type: DirectoryOrCreate
        - name: lvmd-socket-dir
          emptyDir: {}
        - name: dev-dir
          hostPath:
            path: /dev
        - name: udev-dir
          hostPath:
            path: /run/udev
        - name: lvm-dir
          hostPath:
            path: /etc/lvm
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: topolvm-provisioner
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: topolvm.io
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
parameters:
  topolvm.io/device-class: default
